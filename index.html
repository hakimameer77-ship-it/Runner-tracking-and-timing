<script>
        const firebaseConfig = {
          apiKey: "AIzaSyAMThjhhw7jWb2pvYz5OFcnvMiTt6-Co",
          authDomain: "runner-system.firebaseapp.com",
          databaseURL: "https://runner-system-default-rtdb.firebaseio.com",
          projectId: "runner-system",
          storageBucket: "runner-system.firebasestorage.app",
          messagingSenderId: "420895973613",
          appId: "1:420895973613:web:5842b54c9fe82e061face4",
          measurementId: "G-2XH1NE0EPT"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const podiumRoot = document.getElementById('leaderboard-podium-root');
        const statTotal = document.getElementById('stat-total');
        const statLatest = document.getElementById('stat-latest');

        const trackingRef = database.ref('tracking/');

        function deleteRunner(runnerId) {
            if (confirm(`Delete Runner ID: ${runnerId}?`)) {
                database.ref('tracking/' + runnerId).remove();
            }
        }

        trackingRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                let runnersArray = Object.values(data);
                
                // Susun berdasarkan elapsed_time terpantas
                runnersArray.sort((a, b) => (a.elapsed_time || Infinity) - (b.elapsed_time || Infinity));
                
                // Cari ping terakhir dari mana-mana stesen imbasan
                let latestRunner = [...runnersArray].sort((a,b) => {
                    let timeA = Math.max(a.start_time || 0, a.checkpoint1_time || 0, a.checkpoint2_time || 0, a.finish_time || 0);
                    let timeB = Math.max(b.start_time || 0, b.checkpoint1_time || 0, b.checkpoint2_time || 0, b.finish_time || 0);
                    return timeB - timeA;
                })[0];
                
                statTotal.innerText = runnersArray.length;
                
                if (latestRunner) {
                    statLatest.innerText = `${latestRunner.runner_id} (${latestRunner.status})`;
                }
                
                podiumRoot.innerHTML = "";
                let topThreeHTML = '<div class="podium-grid">';
                let generalRowsHTML = '<div class="sub-runners-list">';
                
                runnersArray.forEach((runner, index) => {
                    const safeId = runner.runner_id.replace(/'/g, "\\'");
                    let timeDisplay = runner.status === 'Finished' ? `⏱️ ${runner.recorded_time}` : `🏃‍♂️ ${runner.status}`;

                    if (index === 0) {
                        topThreeHTML += `
                            <div class="podium-card rank-1-gold">
                                <button class="btn-delete" onclick="deleteRunner('${safeId}')">❌</button>
                                <div class="card-rank-badge font-orbitron"><span class="emoji-crown">👑</span> #1</div>
                                <div class="card-runner-id">${runner.runner_id}</div>
                                <div class="card-time-meta">${timeDisplay}</div>
                            </div>
                        `;
                    } else if (index === 1) {
                        topThreeHTML += `
                            <div class="podium-card rank-2-silver">
                                <button class="btn-delete" onclick="deleteRunner('${safeId}')">❌</button>
                                <div class="card-rank-badge font-orbitron">🥈 #2</div>
                                <div class="card-runner-id">${runner.runner_id}</div>
                                <div class="card-time-meta">${timeDisplay}</div>
                            </div>
                        `;
                    } else if (index === 2) {
                        topThreeHTML += `
                            <div class="podium-card rank-3-bronze">
                                <button class="btn-delete" onclick="deleteRunner('${safeId}')">❌</button>
                                <div class="card-rank-badge font-orbitron">🥉 #3</div>
                                <div class="card-runner-id">${runner.runner_id}</div>
                                <div class="card-time-meta">${timeDisplay}</div>
                            </div>
                        `;
                    } else {
                        generalRowsHTML += `
                            <div class="runner-pill">
                                <span class="pill-rank">#${index + 1}</span>
                                <span class="pill-id">${runner.runner_id}</span>
                                <span class="pill-time">${timeDisplay}</span>
                                <button class="btn-delete pill-delete" onclick="deleteRunner('${safeId}')">❌</button>
                            </div>
                        `;
                    }
                });
                
                topThreeHTML += '</div>';
                generalRowsHTML += '</div>';
                
                podiumRoot.innerHTML = topThreeHTML;
                if(runnersArray.length > 3) {
                    podiumRoot.innerHTML += generalRowsHTML;
                }
                
            } else {
                statTotal.innerText = "0";
                statLatest.innerText = "NONE";
                podiumRoot.innerHTML = '<div class="loading-text">Awaiting data initialization from checkpoint marshals...</div>';
            }
        });
    </script>
