<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Live Leaderboard - Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="stadium-overlay"></div>

    <div class="container">
        <a href="index.html" style="text-decoration: none; color: #00b4d8; font-weight: 700; font-size: 14px; letter-spacing: 1px; font-family: 'Orbitron', sans-serif;">← KEMBALI KE MENU</a>
        
        <h2>OFFICIAL LIVE STANDINGS</h2>
        
        <div class="stat-grid">
            <div class="stat-card cyan-glow">
                <div class="stat-icon-wrap">🏃‍♂️</div>
                <div class="stat-info">
                    <div class="stat-label">Jumlah Pelari Berdaftar</div>
                    <div class="stat-number" id="stat-total">0</div>
                </div>
            </div>
            <div class="stat-card red-glow">
                <div class="stat-icon-wrap">⚡</div>
                <div class="stat-info">
                    <div class="stat-label">Imbasan Terkini</div>
                    <div class="stat-number" id="stat-latest" style="font-size: 16px; color: #ff4b4b; font-family: 'Orbitron', sans-serif;">None</div>
                </div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Kedudukan (Rank)</th>
                    <th>ID Pelari (Runner ID)</th>
                    <th>Masa Diambil / Status</th>
                </tr>
            </thead>
            <tbody id="leaderboard-data">
                <tr>
                    <td colspan="3" style="text-align: center; color: #8892b0; font-weight: 500;" class="loading-text">
                        Menunggu isyarat kemas kini dari marshal di tapak perlumbaan...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="leaderboard.js"></script>
</body>
</html>
