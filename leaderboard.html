<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Live Standings - 4 Stations</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="stadium-overlay"></div>

    <div class="container">
        <a href="index.html" style="text-decoration: none; color: #00b4d8; font-weight: 700; font-size: 14px; letter-spacing: 1px; font-family: 'Orbitron', sans-serif;">← BACK TO MENU</a>
        
        <h2>OFFICIAL LIVE STANDINGS</h2>
        
        <div class="stat-grid">
            <div class="stat-card cyan-glow">
                <div class="stat-icon-wrap">🏃‍♂️</div>
                <div class="stat-info">
                    <div class="stat-label">Total Registered Runners</div>
                    <div class="stat-number" id="stat-total">0</div>
                </div>
            </div>
            <div class="stat-card red-glow">
                <div class="stat-icon-wrap">⚡</div>
                <div class="stat-info">
                    <div class="stat-label">Latest Scan Update</div>
                    <div class="stat-number" id="stat-latest" style="font-size: 15px; color: #ff4b4b;">None</div>
                </div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Runner ID</th>
                    <th>Current Status / Final Duration</th>
                </tr>
            </thead>
            <tbody id="leaderboard-data">
                <tr>
                    <td colspan="3" class="loading-text">
                        Awaiting race data synchronization from checkpoint marshals...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Konfigurasi Pangkalan Data Firebase Anda
        const firebaseConfig = {
          apiKey: "AIzaSyAMThjhhw7jWb2pvYz5OFcnvMiTt6-Co",
          authDomain: "runner-system.firebaseapp.com",
          databaseURL: "https://runner-system-default-rtdb.firebaseio.com",
          projectId: "runner-system",
          storageBucket: "runner-system.firebasestorage.app",
          messagingSenderId: "420895973613",
          appId: "1:420895973613:web:5842b54c9fe82e061face4",
          measurementId: "G-2XH1NE0EPT"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const tbody = document.getElementById('leaderboard-data');
        const statTotal = document.getElementById('stat-total');
        const statLatest = document.getElementById('stat-latest');

        // Mengambil data secara masa nyata (Realtime)
        database.ref('tracking/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                let runnersArray = Object.values(data);
                
                // Susun pelari berdasarkan masa terpantas (elapsed_time paling kecil di atas)
                runnersArray.sort((a, b) => (a.elapsed_time || Infinity) - (b.elapsed_time || Infinity));
                
                // Cari isyarat imbasan terakhir berdasarkan timestamp terkini dari mana-mana 4 stesen
                let latestRunner = [...runnersArray].sort((a,b) => {
                    let timeA = Math.max(a.start_time || 0, a.checkpoint1_time || 0, a.checkpoint2_time || 0, a.finish_time || 0);
                    let timeB = Math.max(b.start_time || 0, b.checkpoint1_time || 0, b.checkpoint2_time || 0, b.finish_time || 0);
                    return timeB - timeA;
                })[0];

                statTotal.innerText = runnersArray.length;
                if (latestRunner) {
                    statLatest.innerText = `${latestRunner.runner_id} (${latestRunner.status})`;
                }

                tbody.innerHTML = "";
                
                runnersArray.forEach((runner, index) => {
                    let statusHTML = "";
                    
                    // Semak status semasa pelari untuk diberikan gaya warna CSS yang betul
                    if (runner.status === 'Finished') {
                        statusHTML = `<span class="status-badge status-finished">🏁 Finished: ${runner.recorded_time}</span>`;
                    } else {
                        statusHTML = `<span class="status-badge status-progress">🏃‍♂️ ${runner.status}</span>`;
                    }
                    
                    let row = `
                        <tr>
                            <td style="font-family: 'Orbitron', sans-serif; color: #00f5d4;">#${index + 1}</td>
                            <td>${runner.runner_id}</td>
                            <td>${statusHTML}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } else {
                statTotal.innerText = "0";
                statLatest.innerText = "None";
                tbody.innerHTML = `<tr><td colspan="3" class="loading-text">No active runners found. Data is empty.</td></tr>`;
            }
        });
    </script>
</body>
</html>
