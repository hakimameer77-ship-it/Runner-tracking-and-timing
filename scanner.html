<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshal QR Scanning Portal - Pro</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .station-selector {
            margin: 15px 0 25px 0;
            text-align: left;
        }
        .station-selector label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1982c4;
        }
        .station-selector select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            background: #ffffff;
            color: #102a43;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="text-decoration: none; color: #1982c4; font-weight: 600; font-size: 14px;">← Back to Main Menu</a>
        <h2>Marshal Scanning Portal</h2>
        
        <div class="station-selector">
            <label for="scan-station">SELECT SCANNING STATION:</label>
            <select id="scan-station">
                <option value="start">🏁 START LINE (Begin Timing)</option>
                <option value="checkpoint1">📍 CHECKPOINT 1</option>
                <option value="checkpoint2">📍 CHECKPOINT 2</option>
                <option value="finish">🏆 FINISH LINE (Stop & Calculate Time)</option>
            </select>
        </div>

        <div id="reader"></div>
        <div id="result" class="success-msg" style="display: none;"></div>
    </div>

    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script src="scanner.js"></script>
</body>
</html>
